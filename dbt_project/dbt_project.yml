name: 'tanker_brew_admiral'

config-version: 2
version: '0.1'

profile: 'tanker_brew_admiral'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests", "data-tests"]
analysis-paths: ["analysis"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
    - "target"
    - "dbt_modules"
    - "logs"

require-dbt-version: [">=1.0.0", "<2.0.0"]

models:
  tanker_brew_admiral:
    staging:
      +materialized: view
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
